name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fraggle
          POSTGRES_PASSWORD: fraggle
          POSTGRES_DB: fraggle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fraggle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Fraggle#123
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Fraggle#123' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'Fraggle#123' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      FRAGGLE_POSTGRES_URL: postgres://fraggle:fraggle@localhost:5432/fraggle_test?sslmode=disable
      FRAGGLE_MSSQL_URL: sqlserver://SA:Fraggle%23123@localhost:1433?database=master

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  notify-failure:
    if: ${{ failure() }}
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue on pipeline failure
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Pipeline failure: ${{ github.workflow }} (#${{ github.run_number }})" \
            --label "ci" \
            --body "$(cat <<EOF
          **Workflow:** \`${{ github.workflow }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** ${{ github.actor }}
          EOF
          )"
        env:
          GH_TOKEN: ${{ github.token }}
